#TODO: KDBusAddons — D-Bus convenience wrappers. Needs Qt6DBus (qtbase with FEATURE_dbus=ON).
[source]
tar = "https://invent.kde.org/frameworks/kdbusaddons/-/archive/v6.10.0/kdbusaddons-v6.10.0.tar.gz"

[build]
template = "custom"
dependencies = [
    "qtbase",
    "kf6-extra-cmake-modules",
]
script = """
DYNAMIC_INIT

HOST_BUILD="${COOKBOOK_ROOT}/build/qt-host-build"

for qtdir in plugins mkspecs metatypes modules; do
    if [ -d "${COOKBOOK_SYSROOT}/usr/${qtdir}" ] && [ ! -e "${COOKBOOK_SYSROOT}/${qtdir}" ]; then
        ln -s "usr/${qtdir}" "${COOKBOOK_SYSROOT}/${qtdir}"
    fi
done

for tool in qdbuscpp2xml qdbusxml2cpp; do
    if [ -f "${HOST_BUILD}/libexec/$tool" ] && [ ! -e "${HOST_BUILD}/bin/$tool" ]; then
        ln -sf ../libexec/$tool "${HOST_BUILD}/bin/$tool"
    fi
done
if [ ! -e "${HOST_BUILD}/bin/qdbuscpp2xml" ]; then
    ln -sf /usr/bin/qdbuscpp2xml "${HOST_BUILD}/bin/qdbuscpp2xml" 2>/dev/null || true
fi
if [ ! -e "${HOST_BUILD}/bin/qdbusxml2cpp" ]; then
    ln -sf /usr/bin/qdbusxml2cpp "${HOST_BUILD}/bin/qdbusxml2cpp" 2>/dev/null || true
fi

sed -i "s/^ecm_install_po_files_as_qm/#ecm_install_po_files_as_qm/" \
    "${COOKBOOK_SOURCE}/CMakeLists.txt" 2>/dev/null || true

# Disable HAVE_X11 check (no X11 on Redox)
sed -i 's/if(HAVE_X11)/if(FALSE)/' \
    "${COOKBOOK_SOURCE}/src/CMakeLists.txt"
sed -i 's/#if HAVE_X11/#if 0/' \
    "${COOKBOOK_SOURCE}/src/kdbusservice.cpp"

rm -f CMakeCache.txt
rm -rf CMakeFiles

cmake "${COOKBOOK_SOURCE}" \
    -DCMAKE_TOOLCHAIN_FILE="${COOKBOOK_ROOT}/local/recipes/qt/redox-toolchain.cmake" \
    -DQT_HOST_PATH="${HOST_BUILD}" \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_PREFIX_PATH="${COOKBOOK_SYSROOT}" \
    -DBUILD_TESTING=OFF \
    -DBUILD_QCH=OFF \
    -DCMAKE_DISABLE_FIND_PACKAGE_X11=ON \
    -Wno-dev

cmake --build . -j${COOKBOOK_MAKE_JOBS} || true

BUILD_DIR="${COOKBOOK_BUILD}"

for src in "${BUILD_DIR}"/src/moc_*.cpp; do
    [ -f "$src" ] || continue
    base=$(basename "$src" .cpp)
    mocname="${base#moc_}.moc"
    if [ ! -e "${BUILD_DIR}/src/$mocname" ]; then
        ln -sf "$base.cpp" "${BUILD_DIR}/src/$mocname"
    fi
done

for hdr in "${BUILD_DIR}"/src/*_adaptor.h "${BUILD_DIR}"/src/*Iface.h; do
    [ -f "$hdr" ] || continue
    sed -i 's/class QStringList;/typedef QList<QString> QStringList;/' "$hdr"
done

cmake --build . -j${COOKBOOK_MAKE_JOBS}
cmake --install . --prefix "${COOKBOOK_STAGE}/usr"

for lib in "${COOKBOOK_STAGE}/usr/lib/"libKF6*.so.*; do
    [ -f "${lib}" ] || continue
    patchelf --remove-rpath "${lib}" 2>/dev/null || true
done
"""
