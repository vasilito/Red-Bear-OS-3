#TODO: KJobWidgets — job and progress tracking widgets. Depends on qtbase, kf6-kcoreaddons, kf6-ki18n, kf6-kwidgetsaddons. DBus/X11 disabled.
[source]
tar = "https://invent.kde.org/frameworks/kjobwidgets/-/archive/v6.10.0/kjobwidgets-v6.10.0.tar.gz"

[build]
template = "custom"
dependencies = [
    "qtbase",
    "kf6-extra-cmake-modules",
    "kf6-kcoreaddons",
    "kf6-ki18n",
    "kf6-kwidgetsaddons",
    "kf6-knotifications",
]
script = """
DYNAMIC_INIT

HOST_BUILD="${COOKBOOK_ROOT}/build/qt-host-build"

for qtdir in plugins mkspecs metatypes modules; do
    if [ -d "${COOKBOOK_SYSROOT}/usr/${qtdir}" ] && [ ! -e "${COOKBOOK_SYSROOT}/${qtdir}" ]; then
        ln -s "usr/${qtdir}" "${COOKBOOK_SYSROOT}/${qtdir}"
    fi
done

sed -i "s/^ecm_install_po_files_as_qm/#ecm_install_po_files_as_qm/" \
    "${COOKBOOK_SOURCE}/CMakeLists.txt" 2>/dev/null || true
sed -i 's/^ki18n_install(po)/#ki18n_install(po)/' \
    "${COOKBOOK_SOURCE}/CMakeLists.txt" 2>/dev/null || true
sed -i 's/^find_package(KF6Notifications/#find_package(KF6Notifications/' \
    "${COOKBOOK_SOURCE}/CMakeLists.txt" 2>/dev/null || true
sed -i '/find_package(Qt6.*Widgets)/a find_package(Qt6GuiPrivate ${REQUIRED_QT_VERSION} REQUIRED)' \
    "${COOKBOOK_SOURCE}/CMakeLists.txt" 2>/dev/null || true
sed -i '/knotificationjobuidelegate.cpp/d' "${COOKBOOK_SOURCE}/src/CMakeLists.txt" 2>/dev/null || true
sed -i '/knotificationjobuidelegate.h/d' "${COOKBOOK_SOURCE}/src/CMakeLists.txt" 2>/dev/null || true
sed -i 's/KF6::Notifications/#KF6::Notifications/' "${COOKBOOK_SOURCE}/src/CMakeLists.txt" 2>/dev/null || true
sed -i 's/KNotificationJobUiDelegate/#KNotificationJobUiDelegate/' "${COOKBOOK_SOURCE}/src/CMakeLists.txt" 2>/dev/null || true

rm -f CMakeCache.txt
rm -rf CMakeFiles

cmake "${COOKBOOK_SOURCE}" \
    -DCMAKE_TOOLCHAIN_FILE="${COOKBOOK_ROOT}/local/recipes/qt/redox-toolchain.cmake" \
    -DQT_HOST_PATH="${HOST_BUILD}" \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_PREFIX_PATH="${COOKBOOK_SYSROOT}" \
    -DBUILD_TESTING=OFF \
    -DBUILD_QCH=OFF \
    -DUSE_DBUS=OFF \
    -DWITH_X11=OFF \
    -Wno-dev

cmake --build . -j${COOKBOOK_MAKE_JOBS}
cmake --install . --prefix "${COOKBOOK_STAGE}/usr"

for lib in "${COOKBOOK_STAGE}/usr/lib/"libKF6*.so.*; do
    [ -f "${lib}" ] || continue
    patchelf --remove-rpath "${lib}" 2>/dev/null || true
done
"""
