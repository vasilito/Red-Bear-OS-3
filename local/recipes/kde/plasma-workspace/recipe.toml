#TODO: plasma-workspace — KDE Plasma shell. Depends on kwin + all KF6 + dbus.
# Blockers: kwin, kf6-kio, kf6-kxmlgui, plasma-framework (all need DBus + OpenGL)
[source]
tar = "https://invent.kde.org/plasma/plasma-workspace/-/archive/v6.3.4/plasma-workspace-v6.3.4.tar.gz"

[build]
template = "custom"
dependencies = [
    "qtbase",
    "qtdeclarative",
    "qtwayland",
    "qtsvg",
    "kf6-extra-cmake-modules",
    "kf6-karchive",
    "kf6-kauth",
    "kf6-kbookmarks",
    "kf6-kcodecs",
    "kf6-kcompletion",
    "kf6-kconfig",
    "kf6-kconfigwidgets",
    "kf6-kcoreaddons",
    "kf6-kcrash",
    "kf6-kdbusaddons",
    "kf6-kdeclarative",
    "kf6-kglobalaccel",
    "kf6-kguiaddons",
    "kf6-ki18n",
    "kf6-kiconthemes",
    "kf6-kio",
    "kf6-kitemmodels",
    "kf6-kitemviews",
    "kf6-kjobwidgets",
    "kf6-knewstuff",
    "kf6-knotifications",
    "kf6-kpackage",
    "kf6-kservice",
    "kf6-ktextwidgets",
    "kf6-kwallet",
    "kf6-kwidgetsaddons",
    "kf6-kwindowsystem",
    "kf6-kxmlgui",
    "kf6-kirigami",
    "kf6-prison",
    "kf6-solid",
    "plasma-framework",
    "kwin",
    "libwayland",
    "wayland-protocols",
    "mesa",
    "libxkbcommon",
    "dbus",
]
script = """
DYNAMIC_INIT

HOST_BUILD="${COOKBOOK_ROOT}/build/qt-host-build"

rm -f CMakeCache.txt
rm -rf CMakeFiles

for d in plugins mkspecs metatypes modules; do
    if [ ! -e "${COOKBOOK_SYSROOT}/${d}" ] && [ -d "${COOKBOOK_SYSROOT}/usr/${d}" ]; then
        ln -sf "usr/${d}" "${COOKBOOK_SYSROOT}/${d}"
    fi
done

find "${COOKBOOK_SOURCE}" -name CMakeLists.txt -exec sed -i 's/^ecm_install_po_files_as_qm/#ecm_install_po_files_as_qm/' {} \\;
find "${COOKBOOK_SOURCE}" -name CMakeLists.txt -exec sed -i 's/^ki18n_install(po)/#ki18n_install(po)/' {} \\;

cmake "${COOKBOOK_SOURCE}" \
    -DCMAKE_TOOLCHAIN_FILE="${COOKBOOK_ROOT}/local/recipes/qt/redox-toolchain.cmake" \
    -DQT_HOST_PATH="${HOST_BUILD}" \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_PREFIX_PATH="${COOKBOOK_SYSROOT}" \
    -DQT_BUILD_EXAMPLES=OFF \
    -DQT_BUILD_TESTS=OFF \
    -DBUILD_TESTING=OFF \
    -Wno-dev

cmake --build . -j"${COOKBOOK_MAKE_JOBS}"
cmake --install . --prefix "${COOKBOOK_STAGE}/usr"

find "${COOKBOOK_STAGE}" -name '*.so*' -exec patchelf --remove-rpath {} \\; 2>/dev/null || true
"""
