[package]
name = "redbear-udisks"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "redbear-udisks"
path = "src/main.rs"

[dependencies]
zbus = { version = "5", default-features = false, features = ["tokio"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
