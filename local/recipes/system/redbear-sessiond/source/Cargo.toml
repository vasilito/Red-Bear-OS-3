[package]
name = "redbear-sessiond"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "redbear-sessiond"
path = "src/main.rs"

[dependencies]
zbus = { version = "5", default-features = false, features = ["tokio"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
libredox = "0.1"
redox-syscall = { package = "redox_syscall", version = "0.7" }
