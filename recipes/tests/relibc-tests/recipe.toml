# Due to necessary write permission for compilation the filesystem path of source code installation is an exception
# where the package manager can't switch between system-wide and user paths
[source]
same_as = "../../core/relibc"

[build]
template = "custom"
dependencies = ["relibc"]
script = """
git -C "${COOKBOOK_SOURCE}" archive --format=tar HEAD | tar -xf -
rsync -av "${COOKBOOK_SOURCE}/openlibm/" ./openlibm/

patch -N -p1 < "${COOKBOOK_ROOT}/local/patches/relibc/redox.patch"
patch -N -p1 < "${COOKBOOK_ROOT}/local/patches/relibc/P3-eventfd-mod.patch"
patch -N -p1 < "${COOKBOOK_ROOT}/local/patches/relibc/P3-signalfd.patch"
patch -N -p1 < "${COOKBOOK_ROOT}/local/patches/relibc/P3-signalfd-header.patch"
patch -N -p1 < "${COOKBOOK_ROOT}/local/patches/relibc/P3-timerfd-relative.patch"
patch -N -p1 < "${COOKBOOK_ROOT}/local/patches/relibc/P3-waitid.patch"
patch -N -p1 < "${COOKBOOK_ROOT}/local/patches/relibc/P3-semaphore-fixes.patch"
patch -N -p1 < "${COOKBOOK_ROOT}/local/patches/relibc/P3-socket-cred.patch"
patch -N -p1 < "${COOKBOOK_ROOT}/local/patches/relibc/P3-open-memstream.patch"
patch -N -p1 < "${COOKBOOK_ROOT}/local/patches/relibc/P3-ifaddrs-net_if.patch"
patch -N -p1 < "${COOKBOOK_ROOT}/local/patches/relibc/P3-fd-event-tests.patch"

make headers TARGET="${TARGET}"

RELIBC_STAGE="${COOKBOOK_ROOT}/recipes/core/relibc/target/${TARGET}/stage"
if [ ! -d "${RELIBC_STAGE}/usr" ]; then
    RELIBC_STAGE="${COOKBOOK_ROOT}/recipes/core/relibc/target/${TARGET}/stage.tmp"
fi

mkdir -p "${COOKBOOK_SYSROOT}"
rsync -av "${RELIBC_STAGE}/usr/" "${COOKBOOK_SYSROOT}/"
rsync -av "./target/${TARGET}/include/" "${COOKBOOK_SYSROOT}/include/"

mkdir -p ./sysroot
ln -sfn "${COOKBOOK_SYSROOT}" "./sysroot/${TARGET}"

mkdir -pv "${COOKBOOK_STAGE}/home/user/relibc-tests"
cp -rv ./tests "${COOKBOOK_STAGE}/home/user/relibc-tests"
"""

[package]
dependencies = ["gcc13"]
