# Configuration for automated testing of essential test suites
# Smaller test suites are executed first to catch possible bugs or regressions faster

include = ["base.toml"]

# General settings
[general]
# Filesystem size in MiB
filesystem_size = 1024

# Package settings
[packages]
auto-test = {}

[[files]]
path = "/usr/lib/init.d/30_console.service"
data = """
[unit]
description = "Automated test runner"
requires_weak = ["00_base.target"]

[service]
cmd = "ion"
args = ["/usr/lib/run_tests.ion"]
type = "oneshot"
"""

[[files]]
path = "/usr/lib/run_tests.ion"
data = """
#!/usr/bin/env ion
export RUST_BACKTRACE=full
cd /home/user/acid
cargo test
bash /root/relibc-tests/run.sh
os-test-runner
shutdown
"""
