# Red Bear OS Full Configuration
# Desktop/graphics ISO for bare metal and QEMU.
#
# Build: make live CONFIG_NAME=redbear-full
# QEMU:  make all CONFIG_NAME=redbear-full && make qemu
#
# Extends redbear-mini with the full desktop/graphics stack:
# Wayland, Qt6, KF6, KWin, Mesa, DRM drivers, firmware, greeter.

include = ["redbear-mini.toml"]

[general]
filesystem_size = 4096
efi_partition_size = 16

[users.messagebus]
uid = 100
gid = 100
name = "messagebus"
home = "/nonexistent"
shell = "/usr/bin/ion"

[packages]
# Firmware loading
redbear-firmware = {}
firmware-loader = {}

# GPU/graphics stack
redox-drm = {}
mesa = {}
libdrm = {}

# Wayland protocol
libwayland = {}
wayland-protocols = {}

# Keyboard/input
libxkbcommon = {}
xkeyboard-config = {}
libevdev = {}
libinput = {}

# Seat management
seatd = {}

# Qt6 stack
qtbase = {}
qtdeclarative = {}
qtsvg = {}
qtwayland = {}
qt6-wayland-smoke = {}

# KF6 Frameworks
kf6-extra-cmake-modules = {}
kf6-kcoreaddons = {}
kf6-kconfig = {}
kf6-ki18n = {}
kf6-kcolorscheme = {}
kf6-kauth = {}
kf6-kwindowsystem = {}
kf6-knotifications = {}
kf6-kconfigwidgets = {}
kf6-kcrash = {}
kf6-kdbusaddons = {}
kf6-kglobalaccel = {}
kf6-kservice = {}
kf6-kpackage = {}
kf6-kiconthemes = {}
kirigami = {}
kf6-kio = {}
kf6-kdeclarative = {}
kf6-kcmutils = {}
kf6-kwayland = {}
kdecoration = {}
kf6-kded6 = {}
kglobalacceld = {}

# KWin Wayland compositor
kwin = {}

# Greeter/login stack
redbear-authd = {}
redbear-session-launch = {}
redbear-greeter = {}

# Core Red Bear umbrella package
redbear-meta = {}

# Desktop fonts and icons
dejavu = {}
freefont = {}
hicolor-icon-theme = {}
pop-icon-theme = {}

# Suppress legacy desktop packages
orbdata = "ignore"
orbital = "ignore"
orbterm = "ignore"
orbutils = "ignore"
cosmic-edit = "ignore"
cosmic-files = "ignore"
cosmic-icons = "ignore"
cosmic-term = "ignore"

[[files]]
path = "/lib/firmware/amdgpu"
data = ""
directory = true
mode = 0o755

[[files]]
path = "/usr/lib/fonts"
data = "/usr/share/fonts"
symlink = true

[[files]]
path = "/usr/lib/init.d/05_boot-essential.target"
data = """
[unit]
description = "Boot essential services target"
requires_weak = [
    "00_base.target",
]
"""

[[files]]
path = "/usr/lib/init.d/13_iommu.service"
data = """
[unit]
description = "IOMMU DMA remapping daemon"
requires_weak = [
    "12_boot-late.target",
    "00_pcid-spawner.service",
]

[service]
cmd = "/usr/bin/iommu"
type = "oneshot_async"
"""

[[files]]
path = "/usr/lib/init.d/12_dbus.service"
data = """
[unit]
description = "D-Bus system bus"
requires_weak = [
    "12_boot-late.target",
]

[service]
cmd = "ion"
args = [
    "-c",
    "mkdir -p /var/lib/dbus /run/dbus; rm -f /run/dbus/pid; dbus-uuidgen --ensure; dbus-daemon --system",
]
type = "oneshot_async"
"""

[[files]]
path = "/usr/lib/init.d/13_redbear-sessiond.service"
data = """
[unit]
description = "Red Bear session broker (org.freedesktop.login1)"
requires_weak = [
    "12_dbus.service",
]

[service]
cmd = "ion"
args = [
    "-c",
    "redbear-sessiond",
]
type = "oneshot_async"
"""

[[files]]
path = "/usr/lib/init.d/13_seatd.service"
data = """
[unit]
description = "seatd seat management daemon"
requires_weak = [
    "12_dbus.service",
    "13_redbear-sessiond.service",
]

[service]
cmd = "seatd"
args = ["-l", "info"]
type = "oneshot_async"
"""

[[files]]
path = "/usr/lib/init.d/14_redbear-upower.service"
data = """
[unit]
description = "UPower D-Bus service (org.freedesktop.UPower)"
requires_weak = [
    "12_dbus.service",
]

[service]
cmd = "ion"
args = [
    "-c",
    "redbear-upower",
]
type = "oneshot_async"
"""

[[files]]
path = "/usr/lib/init.d/14_redbear-udisks.service"
data = """
[unit]
description = "UDisks2 D-Bus service (org.freedesktop.UDisks2)"
requires_weak = [
    "12_dbus.service",
]

[service]
cmd = "ion"
args = [
    "-c",
    "redbear-udisks",
]
type = "oneshot_async"
"""

[[files]]
path = "/usr/lib/init.d/14_redbear-polkit.service"
data = """
[unit]
description = "PolicyKit1 D-Bus service (org.freedesktop.PolicyKit1)"
requires_weak = [
    "12_dbus.service",
]

[service]
cmd = "ion"
args = [
    "-c",
    "redbear-polkit",
]
type = "oneshot_async"
"""

[[files]]
path = "/usr/lib/init.d/19_redbear-authd.service"
data = """
[unit]
description = "Red Bear authentication daemon"
requires_weak = [
    "12_dbus.service",
]

[service]
cmd = "ion"
args = [
    "-c",
    "redbear-authd",
]
type = "oneshot_async"
"""

[[files]]
path = "/usr/lib/init.d/20_greeter.service"
data = """
[unit]
description = "Red Bear greeter service"
requires_weak = [
    "12_dbus.service",
    "13_redbear-sessiond.service",
    "13_seatd.service",
    "19_redbear-authd.service",
]

[service]
cmd = "/usr/bin/redbear-greeterd"
envs = { VT = "3", REDBEAR_GREETER_USER = "greeter" }
type = "oneshot_async"
"""

[[files]]
path = "/usr/lib/init.d/29_activate_console.service"
data = """
[unit]
description = "Activate fallback console VT"
requires_weak = [
    "05_boot-essential.target",
]

[service]
cmd = "inputd"
args = ["-A", "2"]
type = "oneshot_async"
"""

[[files]]
path = "/usr/lib/init.d/30_console.service"
data = """
[unit]
description = "Console terminals"
requires_weak = [
    "29_activate_console.service",
]

[service]
cmd = "getty"
args = ["2"]
type = "oneshot_async"
respawn = true
"""

[[files]]
path = "/usr/lib/init.d/31_debug_console.service"
data = """
[unit]
description = "Debug console"
requires_weak = [
    "29_activate_console.service",
]

[service]
cmd = "getty"
args = ["/scheme/debug/no-preserve", "-J"]
type = "oneshot_async"
respawn = true
"""

[users.greeter]
password = ""
uid = 101
gid = 101
name = "greeter"
home = "/nonexistent"
shell = "/usr/bin/ion"

[groups.greeter]
gid = 101
members = ["greeter"]

[[files]]
path = "/etc/pcid.d/ihdgd.toml"
data = """
[[drivers]]
name = "Intel GPU (VGA compatible)"
class = 0x03
vendor = 0x8086
subclass = 0x00
command = ["redox-drm"]

[[drivers]]
name = "Intel GPU (3D controller)"
class = 0x03
vendor = 0x8086
subclass = 0x02
command = ["redox-drm"]
"""

[[files]]
path = "/etc/pcid.d/virtio-gpud.toml"
data = """
[[drivers]]
name = "VirtIO GPU"
class = 0x03
vendor = 0x1af4
subclass = 0x00
command = ["redox-drm"]
"""
