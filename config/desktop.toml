# Default build system configuration

include = ["desktop-minimal.toml", "server.toml"]

# General settings
[general]
# Filesystem size in MiB
filesystem_size = 650

# Package settings
[packages]
cosmic-edit = "ignore"
cosmic-files = "ignore"
cosmic-icons = "ignore"
cosmic-term = "ignore"
dejavu = {}
ext4d = {}
freefont = {}
hicolor-icon-theme = {}
installer-gui = {}
netsurf = {}
patchelf = {}
pop-icon-theme = {}
shared-mime-info = {}
# orbterm from desktop-minimal should be ignored
orbterm = "ignore"
