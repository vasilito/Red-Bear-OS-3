    | |/ / || |/ _ \\ | '_ \\| | | / __|
    |   < | || | (_) || |_) | |_| \\__ \\
    |_|\\_\\|_|/ |\\___/ | .__/ \\__,_|___/
           |__/       | |              
                       |_|             

   Red Bear OS v0.2.0 "Liliya" — Built on Redox OS
