# Configuration for automated self-hosted system compilation testing

include = ["server.toml"]

# General settings
[general]
# Filesystem size in MiB
filesystem_size = 10000

# Package settings
[packages]
cookbook = {}
bottom = "ignore"
kibi = "ignore"

[[files]]
path = "/usr/lib/init.d/30_console.service"
data = """
[unit]
description = "System build test"
requires_weak = ["00_base.target"]

[service]
cmd = "ion"
args = ["/usr/lib/sys_build.ion"]
type = "oneshot"
"""

[[files]]
path = "/usr/lib/sys_build.ion"
data = """
#!/usr/bin/env ion
export RUST_BACKTRACE=full
cd /home/user/cookbook
make prefix r.sys,--with-package-deps
shutdown
"""
